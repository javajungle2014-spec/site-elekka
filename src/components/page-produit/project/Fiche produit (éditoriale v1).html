<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elekka — Fiche produit (éditoriale)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:        '#0a0a0a',
          'ink-soft': '#1f1f1f',
          paper:      '#fafaf9',
          'paper-2':  '#f2f1ef',
          'paper-3':  '#e8e7e4',
          muted:      '#737373',
          'muted-soft':'#a3a3a3',
          line:       '#e5e5e5',
          'line-ink': '#262626',
          'on-ink':   '#fafaf9',
          'on-ink-muted': '#a3a3a3',
        },
        fontFamily: {
          sans: ['Geist', 'ui-sans-serif', 'system-ui'],
          mono: ['"Geist Mono"', 'ui-monospace'],
        },
      },
    },
  };
</script>
<style>
  body { background: #fafaf9; color: #0a0a0a; font-family: 'Geist', sans-serif; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01", "cv11"; }

  .display { font-weight: 700; letter-spacing: -0.03em; line-height: 0.95; }
  .display-mega { font-weight: 800; letter-spacing: -0.05em; line-height: 0.85; }
  .kicker { font-size: 0.6875rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500; }
  .kicker-tight { font-size: 0.625rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; }

  .press { transition: transform 200ms cubic-bezier(0.16, 1, 0.3, 1), background-color 200ms, color 200ms, border-color 200ms; }
  .press:active { transform: translateY(1px); }

  /* Marquee infini */
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 38s linear infinite; }

  /* Pulse subtle */
  @keyframes pulseDot { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .pulse-dot { animation: pulseDot 2.4s ease-in-out infinite; }

  /* Gros chiffre filigrane */
  .ghost-num {
    font-family: 'Geist', sans-serif;
    font-weight: 800;
    letter-spacing: -0.05em;
    line-height: 0.8;
    color: transparent;
    -webkit-text-stroke: 1px #d4d4d4;
  }

  /* Image placeholders */
  .placeholder-leather {
    background:
      radial-gradient(ellipse 70% 50% at 35% 30%, rgba(255,255,255,0.06), transparent 70%),
      radial-gradient(ellipse 50% 70% at 70% 75%, rgba(0,0,0,0.4), transparent 60%),
      linear-gradient(150deg, #1f1f1f 0%, #0a0a0a 100%);
  }
  .placeholder-paper {
    background:
      radial-gradient(ellipse 80% 60% at 30% 30%, rgba(255,255,255,0.6), transparent 70%),
      linear-gradient(135deg, #f2f1ef 0%, #e8e7e4 100%);
  }
  .placeholder-tabac {
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,235,210,0.25), transparent 55%),
      linear-gradient(140deg, #4a3424 0%, #2e1f14 100%);
  }
  .placeholder-fauve {
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,240,220,0.3), transparent 55%),
      linear-gradient(140deg, #9a7a55 0%, #6b4f33 100%);
  }
  .placeholder-noir {
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.06), transparent 55%),
      linear-gradient(140deg, #2a2620 0%, #0e0c0a 100%);
  }

  /* CTA sticky shine */
  .cta-shine { position: relative; overflow: hidden; }
  .cta-shine::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%); transition: transform 700ms ease;
  }
  .cta-shine:hover::after { transform: translateX(100%); }

  /* Filets diagonaux pour swatches actifs */
  .swatch-active { box-shadow: 0 0 0 1px #0a0a0a, 0 0 0 4px #fafaf9, 0 0 0 5px #0a0a0a; }

  /* Underline label-grow */
  .label-grow { background-image: linear-gradient(#0a0a0a, #0a0a0a); background-size: 0% 1px; background-repeat: no-repeat; background-position: 0 100%; transition: background-size 400ms ease; }
  .label-grow:hover { background-size: 100% 1px; }

  /* Custom scrollbar (subtle) */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d4d4d4; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Spec table */
  .spec-row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; padding: 14px 0; border-bottom: 1px solid #e5e5e5; }
  .spec-row:last-child { border-bottom: 0; }

  /* Annotation style */
  .annot {
    position: relative;
    padding-left: 28px;
  }
  .annot::before {
    content: '';
    position: absolute;
    left: 0; top: 0.7em;
    width: 20px; height: 1px;
    background: #a3a3a3;
  }

  /* Body padding bottom for sticky bar */
  body { padding-bottom: 84px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ─── Icons (monoline Geist-friendly) ─────────────────────────────────── */
const Icon = ({ children, size = 16, stroke = 1.4, ...rest }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={stroke}
    strokeLinecap="round" strokeLinejoin="round" {...rest}>
    {children}
  </svg>
);
const ArrowLeft  = (p) => <Icon {...p}><path d="M19 12H5M12 19l-7-7 7-7" /></Icon>;
const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14M12 5l7 7-7 7" /></Icon>;
const ArrowUpRight = (p) => <Icon {...p}><path d="M7 17 17 7M7 7h10v10" /></Icon>;
const Plus  = (p) => <Icon {...p}><path d="M12 5v14M5 12h14" /></Icon>;
const Minus = (p) => <Icon {...p}><path d="M5 12h14" /></Icon>;
const Check = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5" /></Icon>;
const Heart = ({ filled, ...p }) => (
  <Icon {...p}>
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          fill={filled ? "currentColor" : "none"} />
  </Icon>
);
const Bag = (p) => <Icon {...p}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0" /></Icon>;
const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></Icon>;
const Menu = (p) => <Icon {...p}><path d="M3 12h18M3 6h18M3 18h18" /></Icon>;

/* ─── Données factices (équivalent Product) ───────────────────────────── */
const PRODUCT = {
  slug: "filet-andante",
  name: "Andante",
  family: "Collection Signature",
  number: "024",
  tagline: "Filet anglais, cuir pleine fleur",
  priceEUR: 24500,
  description:
    "Un filet d'inspiration anglaise au dessin épuré, façonné dans un cuir tanné en France. Coutures sellier réalisées à la main, finitions au tranchefil, boucleries en laiton bruni.",
  longDescription:
    "Conçu pour le travail sur le plat comme pour le saut, l'Andante allie souplesse immédiate et tenue dans le temps. Chaque pièce passe entre les mains de quatre artisans, du débitage du cuir au montage final.",
  defaultColour: "tabac",
  defaultSize: "Full",
  colours: [
    { key: "tabac", label: "Tabac", swatch: "#3D2A1C" },
    { key: "fauve", label: "Fauve", swatch: "#8A6A47" },
    { key: "noir",  label: "Noir",  swatch: "#0a0a0a" },
  ],
  sizes: ["Cob", "Full", "Oversize"],
  highlights: [
    { label: "Cuir",       value: "Pleine fleur, tannage végétal Aveyron" },
    { label: "Couture",    value: "Sellier main, fil de lin ciré" },
    { label: "Bouclerie",  value: "Laiton massif bruni à la main" },
    { label: "Finition",   value: "Tranchefil teint et lustré" },
    { label: "Atelier",    value: "Saumur, Maine-et-Loire" },
    { label: "Garantie",   value: "5 ans, réparation à vie" },
  ],
};

const formatPrice = (cents) =>
  new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR", minimumFractionDigits: 0 })
    .format(cents / 100);

/* ─── Header minimal ──────────────────────────────────────────────────── */
function Header() {
  return (
    <header className="sticky top-0 z-40 bg-paper/85 backdrop-blur border-b border-line">
      <div className="px-6 md:px-10 h-14 flex items-center justify-between">
        <div className="flex items-center gap-8">
          <button className="press md:hidden text-ink"><Menu size={18} /></button>
          <a href="#" className="display text-xl tracking-tight">Elekka</a>
          <nav className="hidden md:flex items-center gap-7 text-xs">
            <a href="#" className="text-ink hover:text-muted transition-colors">Boutique</a>
            <a href="#" className="text-muted hover:text-ink transition-colors">Atelier</a>
            <a href="#" className="text-muted hover:text-ink transition-colors">Journal</a>
            <a href="#" className="text-muted hover:text-ink transition-colors">Contact</a>
          </nav>
        </div>
        <div className="flex items-center gap-5 text-ink">
          <button className="press"><Search size={16} /></button>
          <button className="press"><Heart size={16} /></button>
          <button className="press relative">
            <Bag size={16} />
            <span className="absolute -top-1 -right-1.5 w-3.5 h-3.5 bg-ink text-on-ink text-[8px] font-mono flex items-center justify-center">2</span>
          </button>
        </div>
      </div>
    </header>
  );
}

/* ─── Marquee perks ───────────────────────────────────────────────────── */
function PerksMarquee() {
  const items = [
    "Livraison offerte",
    "Rênes offertes à l'achat",
    "Tannage français",
    "Expédié sous 48 h",
    "Retours 30 jours",
    "Paiement 3× sans frais",
  ];
  const Loop = () => (
    <div className="flex items-center gap-12 shrink-0 px-6">
      {items.map((it, i) => (
        <span key={i} className="flex items-center gap-12">
          <span className="kicker-tight text-on-ink">{it}</span>
          <span className="w-1 h-1 rounded-full bg-on-ink-muted" />
        </span>
      ))}
    </div>
  );
  return (
    <div className="bg-ink text-on-ink py-3 overflow-hidden border-y border-line-ink">
      <div className="flex marquee-track w-max">
        <Loop /><Loop />
      </div>
    </div>
  );
}

/* ─── Hero éditorial ──────────────────────────────────────────────────── */
function Hero({ product, colour }) {
  return (
    <section className="relative">
      {/* Ghost number absolument positionné comme couverture de magazine */}
      <div
        className="ghost-num absolute -top-2 right-6 md:right-12 select-none pointer-events-none hidden md:block"
        style={{ fontSize: "clamp(180px, 22vw, 360px)" }}
      >
        N°{product.number}
      </div>

      <div className="grid grid-cols-12 gap-0">
        {/* Image full-bleed à gauche, sortant du conteneur */}
        <div className="col-span-12 md:col-span-7 relative">
          <div className={`relative aspect-[4/5] md:aspect-[3/4] overflow-hidden placeholder-${colour}`}>
            {/* Coin haut-gauche : index image */}
            <div className="absolute top-6 left-6 right-6 flex items-start justify-between">
              <div className="flex items-center gap-3 text-on-ink/70">
                <span className="w-1.5 h-1.5 rounded-full bg-on-ink pulse-dot" />
                <span className="kicker-tight">En stock</span>
              </div>
              <span className="font-mono text-[11px] tracking-wider text-on-ink/70">01 / 04</span>
            </div>
            {/* Coin bas : annotation cuir */}
            <div className="absolute bottom-6 left-6 right-6 flex items-end justify-between">
              <p className="kicker-tight text-on-ink/70 max-w-[14ch]">
                Profil — couture sellier visible
              </p>
              <button
                className="press w-10 h-10 border border-on-ink/30 flex items-center justify-center text-on-ink/80 hover:bg-on-ink/10 transition-colors"
                aria-label="Zoom"
              >
                <Plus size={14} />
              </button>
            </div>
          </div>

          {/* Miniatures sous l'image */}
          <div className="grid grid-cols-4 gap-1 mt-1">
            {[0,1,2,3].map((i) => (
              <button
                key={i}
                className={`relative aspect-square placeholder-${colour} press transition-opacity ${i === 0 ? 'opacity-100' : 'opacity-40 hover:opacity-80'}`}
              >
                <span className="absolute bottom-2 left-2 font-mono text-[9px] text-on-ink/60 tracking-wider">0{i+1}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Colonne titre — chevauche subtilement l'image en md+ */}
        <div className="col-span-12 md:col-span-5 px-6 md:pl-12 md:pr-10 pt-10 md:pt-20 relative">
          <div className="relative z-10">
            <p className="kicker-tight text-muted">{product.family}</p>

            {/* Titre géant */}
            <h1 className="display-mega mt-8 text-[5.5rem] md:text-[7rem] xl:text-[9rem] text-ink">
              {product.name}<span className="text-muted-soft">.</span>
            </h1>

            {/* Tagline + filet */}
            <div className="mt-8 flex items-center gap-4">
              <span className="h-px flex-1 bg-line-ink" />
              <p className="text-sm text-ink">{product.tagline}</p>
            </div>

            {/* Prix gigantesque */}
            <div className="mt-12 flex items-baseline gap-3">
              <span className="font-mono text-[10px] tracking-widest text-muted uppercase">À partir de</span>
            </div>
            <div className="flex items-end gap-4 mt-1">
              <p className="display text-[3.5rem] md:text-[4rem] tabular-nums leading-none">
                {formatPrice(product.priceEUR)}
              </p>
              <span className="text-xs text-muted pb-3">TTC · 3× sans frais</span>
            </div>

            {/* Mini-description */}
            <p className="mt-10 text-sm text-ink/75 leading-relaxed max-w-[44ch]">
              {product.description}
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── Configurateur — bande horizontale qui traverse la page ──────────── */
function Configurator({ product, selectedColour, setSelectedColour, selectedSize, setSelectedSize }) {
  const currentColour = product.colours.find((c) => c.key === selectedColour);
  return (
    <section className="mt-20 md:mt-28 border-y border-line-ink">
      <div className="grid grid-cols-12">
        {/* Label section */}
        <div className="col-span-12 md:col-span-2 border-r border-line-ink px-6 md:px-8 py-8 flex md:flex-col items-start gap-3 md:gap-1">
          <span className="font-mono text-[10px] text-muted tracking-widest">01</span>
          <span className="kicker-tight text-ink">Configurer</span>
        </div>

        {/* Coloris */}
        <div className="col-span-12 md:col-span-5 border-r border-line-ink px-6 md:px-10 py-8">
          <div className="flex items-baseline justify-between mb-6">
            <p className="kicker text-muted">Coloris</p>
            <p className="text-[11px] text-ink font-mono">
              {String(product.colours.findIndex(c => c.key === selectedColour) + 1).padStart(2,'0')} / {String(product.colours.length).padStart(2, '0')}
            </p>
          </div>

          <div className="space-y-3">
            {product.colours.map((c) => {
              const active = c.key === selectedColour;
              return (
                <button
                  key={c.key}
                  onClick={() => setSelectedColour(c.key)}
                  className={`group press w-full flex items-center justify-between py-3 border-b transition-colors ${
                    active ? 'border-ink' : 'border-line hover:border-muted'
                  }`}
                >
                  <div className="flex items-center gap-4">
                    <span
                      className={`block w-7 h-7 transition-all ${active ? 'swatch-active' : ''}`}
                      style={{ backgroundColor: c.swatch }}
                    />
                    <span className={`text-sm tracking-wide ${active ? 'text-ink font-medium' : 'text-muted group-hover:text-ink'}`}>
                      {c.label}
                    </span>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="font-mono text-[10px] text-muted tracking-wider">
                      {c.key.toUpperCase()}
                    </span>
                    {active
                      ? <Check size={14} className="text-ink" stroke={2} />
                      : <ArrowRight size={14} className="text-muted-soft" />}
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Taille */}
        <div className="col-span-12 md:col-span-5 px-6 md:px-10 py-8">
          <div className="flex items-baseline justify-between mb-6">
            <p className="kicker text-muted">Taille</p>
            <button className="text-[11px] text-muted hover:text-ink transition-colors flex items-center gap-1.5 label-grow">
              Guide des tailles
              <ArrowUpRight size={11} />
            </button>
          </div>

          <div className="grid grid-cols-3 gap-0 border border-line">
            {product.sizes.map((size, i) => {
              const active = size === selectedSize;
              return (
                <button
                  key={size}
                  onClick={() => setSelectedSize(size)}
                  className={`press relative h-20 transition-colors ${
                    i > 0 ? 'border-l border-line' : ''
                  } ${active ? 'bg-ink text-on-ink' : 'bg-paper text-ink hover:bg-paper-2'}`}
                >
                  <span className={`absolute top-2 left-2.5 font-mono text-[10px] tracking-wider ${active ? 'text-on-ink-muted' : 'text-muted-soft'}`}>
                    0{i + 1}
                  </span>
                  <span className="display text-2xl">{size}</span>
                  {size === "Full" && (
                    <span className={`absolute bottom-2 right-2.5 font-mono text-[9px] tracking-widest ${active ? 'text-on-ink-muted' : 'text-muted-soft'}`}>
                      STD
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          <p className="mt-4 text-[11px] text-muted leading-relaxed">
            La taille <span className="text-ink font-medium">Full</span> couvre la majorité des chevaux de selle adultes.
          </p>
        </div>
      </div>
    </section>
  );
}

/* ─── Section "L'objet" — colonnes journalistiques ────────────────────── */
function ObjectSection({ product }) {
  return (
    <section className="mt-20 md:mt-28 px-6 md:px-10">
      <div className="grid grid-cols-12 gap-8 md:gap-12">
        {/* Label */}
        <div className="col-span-12 md:col-span-2">
          <span className="font-mono text-[10px] text-muted tracking-widest">02</span>
          <p className="kicker-tight text-ink mt-1">L'objet</p>
        </div>

        {/* Phrase d'accroche éditoriale */}
        <div className="col-span-12 md:col-span-10">
          <p className="display text-2xl md:text-[2.4rem] xl:text-[2.75rem] leading-[1.1] max-w-[24ch]">
            Quatre paires de mains, <span className="text-muted">huit semaines</span>, un objet pour la vie.
          </p>
        </div>
      </div>

      {/* Spec grid — colonnes désalignées */}
      <div className="mt-16 grid grid-cols-12 gap-y-10 md:gap-x-12">
        {product.highlights.map((h, i) => (
          <div
            key={h.label}
            className={`col-span-12 sm:col-span-6 md:col-span-4 ${
              // Décalage vertical pour effet journal
              i % 3 === 1 ? 'md:translate-y-6' : i % 3 === 2 ? 'md:translate-y-12' : ''
            }`}
          >
            <div className="border-t border-ink pt-4">
              <div className="flex items-baseline justify-between mb-3">
                <span className="font-mono text-[10px] text-muted tracking-widest">
                  /{String(i + 1).padStart(2, '0')}
                </span>
                <span className="kicker-tight text-muted">{h.label}</span>
              </div>
              <p className="display text-xl leading-tight max-w-[20ch]">
                {h.value}
              </p>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

/* ─── Détail technique — split image annotée + texte long ─────────────── */
function DetailSection({ product, colour }) {
  return (
    <section className="mt-32 md:mt-40 px-6 md:px-10">
      <div className="grid grid-cols-12 gap-8 md:gap-12">
        {/* Image carrée détail couture, surdimensionnée */}
        <div className="col-span-12 md:col-span-7 relative">
          <div className={`relative aspect-square placeholder-${colour} overflow-hidden`}>
            {/* Annotations style schéma technique */}
            <div className="absolute top-1/4 left-1/2 flex items-center gap-3 text-on-ink/80">
              <span className="w-2 h-2 border border-on-ink rounded-full" />
              <span className="w-16 h-px bg-on-ink/40" />
              <span className="kicker-tight whitespace-nowrap">Couture sellier</span>
            </div>
            <div className="absolute bottom-1/3 right-1/4 flex items-center gap-3 text-on-ink/80">
              <span className="kicker-tight whitespace-nowrap">Bouclerie laiton</span>
              <span className="w-12 h-px bg-on-ink/40" />
              <span className="w-2 h-2 border border-on-ink rounded-full" />
            </div>
            <div className="absolute bottom-6 left-6 font-mono text-[10px] text-on-ink/60 tracking-wider">
              FIG. 02 — DÉTAIL
            </div>
          </div>
        </div>

        {/* Texte long */}
        <div className="col-span-12 md:col-span-5 md:pt-10">
          <p className="kicker-tight text-muted mb-6">/03 Atelier</p>
          <p className="text-base text-ink leading-relaxed max-w-[42ch]">
            {product.longDescription}
          </p>

          <div className="mt-10 space-y-4 text-sm text-muted leading-relaxed">
            <p className="annot">
              Chaque cuir est sélectionné parmi les peaux françaises tannées végétalement en Aveyron, dans une tannerie centenaire qui n'utilise aucun chrome.
            </p>
            <p className="annot">
              Le filet est numéroté à la main au verso de la têtière et accompagné d'un certificat signé.
            </p>
          </div>

          <a href="#" className="mt-12 inline-flex items-center gap-2 text-sm text-ink border-b border-ink pb-1 press hover:gap-3 transition-all">
            Visiter l'atelier
            <ArrowUpRight size={14} />
          </a>
        </div>
      </div>
    </section>
  );
}

/* ─── Onglets / FAQ minimaliste ───────────────────────────────────────── */
function Tabs() {
  const tabs = ["Description", "Guide de taille", "Composition", "Entretien"];
  const [active, setActive] = useState(0);
  const content = [
    "Filet anglais à muserolle française. Cuir pleine fleur tanné végétal, monté sellier. Chaque pièce est numérotée et passe par un contrôle qualité en quatre étapes avant expédition.",
    "Cob convient aux chevaux fins, poneys de selle, jeunes chevaux. Full est la taille standard, adaptée à 80% des chevaux de selle adultes. Oversize pour les chevaux de trait léger et grands gabarits.",
    "Cuir pleine fleur (75%), laiton massif (15%), fil de lin ciré (5%), accessoires inox (5%). Aucun composant synthétique, aucun chrome.",
    "Nettoyer au savon glycériné une fois par mois. Nourrir avec un baume cuir tous les trois mois. Éviter l'humidité prolongée. Réparation gratuite la première année.",
  ];
  return (
    <section className="mt-32 md:mt-40 px-6 md:px-10">
      <div className="grid grid-cols-12 gap-8 md:gap-12">
        <div className="col-span-12 md:col-span-2">
          <span className="font-mono text-[10px] text-muted tracking-widest">04</span>
          <p className="kicker-tight text-ink mt-1">Notice</p>
        </div>

        <div className="col-span-12 md:col-span-10">
          {/* Onglets en liste verticale numerotée */}
          <div className="flex flex-col gap-0">
            {tabs.map((t, i) => {
              const isActive = i === active;
              return (
                <div key={t} className="border-t border-line last:border-b">
                  <button
                    onClick={() => setActive(i)}
                    className="press w-full flex items-center justify-between py-5 text-left group"
                  >
                    <div className="flex items-baseline gap-6">
                      <span className="font-mono text-[10px] text-muted tracking-widest">/0{i+1}</span>
                      <span className={`display text-xl md:text-2xl transition-colors ${isActive ? 'text-ink' : 'text-muted group-hover:text-ink'}`}>
                        {t}
                      </span>
                    </div>
                    <span className="text-muted">
                      {isActive ? <Minus size={16} /> : <Plus size={16} />}
                    </span>
                  </button>
                  {isActive && (
                    <div className="pl-0 md:pl-[5.25rem] pb-8 pr-6">
                      <p className="text-sm text-ink/75 leading-relaxed max-w-[60ch]">
                        {content[i]}
                      </p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── CTA sticky en bas ───────────────────────────────────────────────── */
function StickyCart({ product, colour, size, onAdd, added, favorite, onFavorite }) {
  const currentColour = product.colours.find((c) => c.key === colour);
  return (
    <div className="fixed bottom-0 left-0 right-0 z-50 bg-ink text-on-ink border-t border-line-ink">
      <div className="px-4 md:px-10 h-[68px] flex items-center justify-between gap-3">
        {/* Récap config */}
        <div className="flex items-center gap-4 md:gap-6 min-w-0">
          <div
            className="hidden sm:block w-10 h-10 shrink-0"
            style={{ backgroundColor: currentColour.swatch }}
          />
          <div className="min-w-0">
            <p className="text-sm font-medium leading-tight truncate">
              {product.name} <span className="text-on-ink-muted">·</span> <span className="text-on-ink-muted">{currentColour.label} / {size}</span>
            </p>
            <p className="font-mono text-[10px] text-on-ink-muted tracking-wider mt-0.5 hidden sm:block">
              ELK-{product.slug.slice(0,3).toUpperCase()}-{colour.slice(0,3).toUpperCase()}-{size.slice(0,3).toUpperCase()}
            </p>
          </div>
        </div>

        {/* Prix + CTA */}
        <div className="flex items-stretch gap-2 shrink-0">
          <p className="hidden md:flex font-mono text-lg tabular-nums items-center px-2">
            {formatPrice(product.priceEUR)}
          </p>
          <button
            onClick={onFavorite}
            aria-label="Favoris"
            className={`press hidden sm:flex w-12 h-12 border items-center justify-center transition-colors ${
              favorite ? 'bg-on-ink text-ink border-on-ink' : 'border-on-ink/30 text-on-ink hover:border-on-ink'
            }`}
          >
            <Heart size={16} filled={favorite} />
          </button>
          <button
            onClick={onAdd}
            className="cta-shine press inline-flex items-center justify-between bg-on-ink text-ink h-12 pl-5 pr-3 gap-4 hover:bg-paper-2 transition-colors min-w-[200px]"
          >
            <span className="text-sm font-medium tracking-wide uppercase">
              {added ? 'Ajouté' : 'Ajouter au panier'}
            </span>
            {added ? <Check size={16} stroke={2} /> : <ArrowRight size={14} />}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Suggestions ─────────────────────────────────────────────────────── */
function Suggestions() {
  const items = [
    { name: "Largo",   tagline: "Filet de dressage, têtière anatomique", price: 28500, num: "025" },
    { name: "Cadenza", tagline: "Filet de saut, muserolle combinée",     price: 26500, num: "026" },
    { name: "Forte",   tagline: "Filet rené, modèle compétition",         price: 32500, num: "027" },
  ];
  return (
    <section className="mt-32 md:mt-40 px-6 md:px-10">
      <div className="flex items-end justify-between mb-10">
        <div>
          <span className="font-mono text-[10px] text-muted tracking-widest">/05</span>
          <p className="display text-2xl md:text-[2rem] mt-2">Autres modèles</p>
        </div>
        <a href="#" className="text-sm text-ink press inline-flex items-center gap-2 border-b border-ink pb-1">
          Voir la collection <ArrowUpRight size={13} />
        </a>
      </div>

      <div className="grid grid-cols-12 gap-6">
        {items.map((it, i) => (
          <a
            key={it.name}
            href="#"
            className={`col-span-12 sm:col-span-6 md:col-span-4 group ${
              i === 1 ? 'md:translate-y-12' : ''
            }`}
          >
            <div className="relative aspect-[4/5] placeholder-paper overflow-hidden">
              <span className="absolute top-4 left-4 font-mono text-[10px] text-muted tracking-wider">
                N°{it.num}
              </span>
              <span className="absolute top-4 right-4 text-muted group-hover:text-ink transition-colors">
                <ArrowUpRight size={14} />
              </span>
            </div>
            <div className="mt-4 flex items-baseline justify-between">
              <div>
                <p className="display text-xl">{it.name}</p>
                <p className="text-xs text-muted mt-1 leading-snug max-w-[28ch]">{it.tagline}</p>
              </div>
              <p className="font-mono text-sm tabular-nums">{formatPrice(it.price)}</p>
            </div>
          </a>
        ))}
      </div>
    </section>
  );
}

/* ─── Footer minimal ──────────────────────────────────────────────────── */
function Footer() {
  return (
    <footer className="mt-32 md:mt-40 border-t border-line-ink">
      <div className="px-6 md:px-10 py-10 grid grid-cols-12 gap-6">
        <div className="col-span-6 md:col-span-3">
          <p className="display text-3xl">Elekka</p>
          <p className="text-xs text-muted mt-2">Saumur — depuis 2014</p>
        </div>
        <div className="col-span-6 md:col-span-2 flex flex-col gap-1.5 text-xs">
          <p className="kicker-tight text-muted-soft mb-2">Boutique</p>
          <a href="#" className="text-ink hover:text-muted transition-colors">Filets</a>
          <a href="#" className="text-ink hover:text-muted transition-colors">Rênes</a>
          <a href="#" className="text-ink hover:text-muted transition-colors">Sur-mesure</a>
        </div>
        <div className="col-span-6 md:col-span-2 flex flex-col gap-1.5 text-xs">
          <p className="kicker-tight text-muted-soft mb-2">Maison</p>
          <a href="#" className="text-ink hover:text-muted transition-colors">Atelier</a>
          <a href="#" className="text-ink hover:text-muted transition-colors">Journal</a>
          <a href="#" className="text-ink hover:text-muted transition-colors">Contact</a>
        </div>
        <div className="col-span-12 md:col-span-5 md:text-right text-xs text-muted">
          <p>© 2026 Elekka. Tous droits réservés.</p>
        </div>
      </div>
    </footer>
  );
}

/* ─── App principal ───────────────────────────────────────────────────── */
function App() {
  const product = PRODUCT;
  const [selectedColour, setSelectedColour] = useState(product.defaultColour);
  const [selectedSize,   setSelectedSize]   = useState(product.defaultSize);
  const [favorite,       setFavorite]       = useState(false);
  const [added,          setAdded]          = useState(false);

  function handleAdd() {
    setAdded(true);
    setTimeout(() => setAdded(false), 1600);
  }

  return (
    <div className="min-h-screen">
      <Header />
      <PerksMarquee />

      {/* Fil d'Ariane minimal */}
      <div className="px-6 md:px-10 pt-8">
        <a href="#" className="inline-flex items-center gap-2 text-xs text-muted hover:text-ink transition-colors press">
          <ArrowLeft size={12} />
          <span>Boutique</span>
          <span className="text-muted-soft mx-1">/</span>
          <span>Filets</span>
          <span className="text-muted-soft mx-1">/</span>
          <span className="text-ink">{product.name}</span>
        </a>
      </div>

      <div className="pt-6 md:pt-10">
        <Hero product={product} colour={selectedColour} />
      </div>

      <Configurator
        product={product}
        selectedColour={selectedColour}
        setSelectedColour={setSelectedColour}
        selectedSize={selectedSize}
        setSelectedSize={setSelectedSize}
      />

      <ObjectSection product={product} />
      <DetailSection product={product} colour={selectedColour} />
      <Tabs />
      <Suggestions />
      <Footer />

      <StickyCart
        product={product}
        colour={selectedColour}
        size={selectedSize}
        onAdd={handleAdd}
        added={added}
        favorite={favorite}
        onFavorite={() => setFavorite((v) => !v)}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
