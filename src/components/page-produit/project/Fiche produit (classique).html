<script type="text/babel" data-presets="react">

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false

//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

  .twk-btn:hover{background:rgba(0,0,0,.88)}

  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Icônes monoline — substituts à @phosphor-icons pour le prototype
// Stroke uniforme, weight regular, taille pilotée par prop size.

const Icon = ({ children, size = 16, stroke = 1.5, className = "", ...rest }) => (
  <svg
    width={size}
    height={size}
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    strokeWidth={stroke}
    strokeLinecap="round"
    strokeLinejoin="round"
    className={className}
    aria-hidden="true"
    {...rest}
  >
    {children}
  </svg>
);

const ArrowLeft  = (p) => <Icon {...p}><path d="M19 12H5M12 19l-7-7 7-7" /></Icon>;
const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14M12 5l7 7-7 7" /></Icon>;
const Check      = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5" /></Icon>;
const Plus       = (p) => <Icon {...p}><path d="M12 5v14M5 12h14" /></Icon>;
const Minus      = (p) => <Icon {...p}><path d="M5 12h14" /></Icon>;
const Heart      = ({ filled, ...p }) => (
  <Icon {...p}>
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          fill={filled ? "currentColor" : "none"} />
  </Icon>
);
const Bag = (p) => (
  <Icon {...p}>
    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0" />
  </Icon>
);
const Truck = (p) => (
  <Icon {...p}>
    <path d="M1 3h15v13H1zM16 8h4l3 3v5h-7M5.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM18.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
  </Icon>
);
const Gift = (p) => (
  <Icon {...p}>
    <path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 1 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
  </Icon>
);
const Shield = (p) => (
  <Icon {...p}>
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </Icon>
);
const Leaf = (p) => (
  <Icon {...p}>
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19.2 2.5c1 1.5 2 5.5 2 8.5a8 8 0 0 1-8 9zM2 21c0-3 1.85-5.36 5.08-6"/>
  </Icon>
);
const Search = (p) => (
  <Icon {...p}><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></Icon>
);

Object.assign(window, {
  Icon, ArrowLeft, ArrowRight, Check, Plus, Minus, Heart, Bag, Truck, Gift, Shield, Leaf, Search
});

// ProductDetailClient — version améliorée (prototype HTML)
// Reproduit fidèlement la structure Tailwind/Next.js attendue.

const { useState } = React;

// ─── Données factices (équivalent Product) ───────────────────────────────
const PRODUCT = {
  slug: "filet-andante",
  name: "Filet Andante",
  family: "Collection Signature",
  tagline: "Cuir pleine fleur, couture sellier",
  priceEUR: 24500,
  description:
    "Un filet d'inspiration anglaise au dessin épuré, façonné dans un cuir tanné en France. Coutures sellier réalisées à la main, finitions au tranchefil, boucleries en laiton bruni.",
  longDescription:
    "Conçu pour le travail sur le plat comme pour le saut, l'Andante allie souplesse immédiate et tenue dans le temps. Chaque pièce est numérotée et signée par l'artisan qui l'a montée.",
  defaultColour: "tabac",
  defaultSize: "Full",
  colours: [
    { key: "tabac",  label: "Tabac",  swatch: "#3D2A1C", hex: "leather-tabac" },
    { key: "fauve",  label: "Fauve",  swatch: "#8A6A47", hex: "leather-fauve" },
    { key: "noir",   label: "Noir",   swatch: "#161512", hex: "leather-noir"  },
  ],
  sizes: ["Cob", "Full", "Oversize"],
  highlights: [
    "Cuir pleine fleur tanné végétal en Aveyron",
    "Couture sellier au fil de lin ciré",
    "Boucleries en laiton massif bruni à la main",
    "Numérotation et signature de l'artisan",
  ],
};

const formatPrice = (cents) =>
  new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR", minimumFractionDigits: 0 })
    .format(cents / 100);

// ─── Sous-composants ─────────────────────────────────────────────────────

function Gallery({ colour, layout }) {
  const [active, setActive] = useState(0);
  const views = ["Profil", "Détail couture", "Bouclerie", "Verso"];

  // L'image principale prend la couleur du cuir choisi pour signaler la sélection
  const bgClass = `leather-${colour}`;

  if (layout === "left-thumbs") {
    return (
      <div className="flex gap-4">
        <div className="flex flex-col gap-2 thumb-rail">
          {views.map((v, i) => (
            <button
              key={v}
              onClick={() => setActive(i)}
              className={`relative w-16 aspect-square overflow-hidden press transition-all ${
                active === i ? "ring-1 ring-ink ring-offset-2 ring-offset-paper" : "opacity-60 hover:opacity-100"
              }`}
            >
              <div className={`absolute inset-0 ${bgClass}`} />
              <span className="absolute bottom-1 left-1.5 text-[8px] tracking-widest uppercase text-white/70 font-mono">
                0{i + 1}
              </span>
            </button>
          ))}
        </div>
        <div className="flex-1 relative aspect-[4/5] overflow-hidden">
          <div className={`absolute inset-0 ${bgClass}`} />
          <div className="absolute top-4 left-4 right-4 flex items-center justify-between">
            <span className="kicker text-white/70">{views[active]}</span>
            <span className="num-suisse text-white/70">0{active + 1} / 0{views.length}</span>
          </div>
          <div className="absolute bottom-4 right-4">
            <div className="w-8 h-8 border border-white/40 rounded-full flex items-center justify-center text-white/70">
              <Search size={12} />
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Default: image principale + miniatures dessous
  return (
    <div>
      <div className="relative aspect-[4/5] overflow-hidden">
        <div className={`absolute inset-0 ${bgClass}`} />
        <div className="absolute top-5 left-5 right-5 flex items-center justify-between">
          <span className="kicker text-white/70">{views[active]}</span>
          <span className="num-suisse text-white/70">0{active + 1} / 0{views.length}</span>
        </div>
        <div className="absolute bottom-5 right-5">
          <div className="w-9 h-9 border border-white/40 rounded-full flex items-center justify-center text-white/70 hover:bg-white/10 transition-colors">
            <Search size={13} />
          </div>
        </div>
      </div>
      <div className="grid grid-cols-4 gap-2 mt-2">
        {views.map((v, i) => (
          <button
            key={v}
            onClick={() => setActive(i)}
            className={`relative aspect-square overflow-hidden press transition-all ${
              active === i ? "ring-1 ring-ink ring-offset-2 ring-offset-paper" : "opacity-55 hover:opacity-100"
            }`}
          >
            <div className={`absolute inset-0 ${bgClass}`} />
          </button>
        ))}
      </div>
    </div>
  );
}

function PerksRow() {
  // Avantages premium : ligne sobre avec filets séparateurs, pas des "stickers"
  return (
    <div className="mt-5 flex items-stretch border-y border-line divide-x divide-line">
      <div className="flex items-center gap-3 px-4 py-3 flex-1">
        <Truck size={18} className="text-ink shrink-0" stroke={1.25} />
        <div className="min-w-0">
          <p className="text-[11px] font-semibold tracking-wide text-ink leading-tight">
            Livraison offerte
          </p>
          <p className="text-[10px] text-muted leading-tight mt-0.5">
            Expédié sous 48 h
          </p>
        </div>
      </div>
      <div className="flex items-center gap-3 px-4 py-3 flex-1">
        <Gift size={18} className="text-ink shrink-0" stroke={1.25} />
        <div className="min-w-0">
          <p className="text-[11px] font-semibold tracking-wide text-ink leading-tight">
            Rênes offertes
          </p>
          <p className="text-[10px] text-muted leading-tight mt-0.5">
            Avec chaque filet
          </p>
        </div>
      </div>
    </div>
  );
}

function ColourSelector({ colours, selected, onChange }) {
  const current = colours.find((c) => c.key === selected);
  return (
    <div>
      <div className="flex items-baseline justify-between mb-4">
        <p className="kicker text-muted">Coloris</p>
        <p className="text-xs text-ink">
          <span className="text-muted">Sélection · </span>
          <span className="font-medium">{current.label}</span>
        </p>
      </div>
      <div className="flex items-center gap-5">
        {colours.map((c) => (
          <button
            key={c.key}
            type="button"
            title={c.label}
            onClick={() => onChange(c.key)}
            data-active={selected === c.key}
            className="swatch-halo group press flex flex-col items-center gap-2"
          >
            <span
              className="block w-8 h-8 rounded-full border border-line shadow-[inset_0_1px_2px_rgba(0,0,0,0.2)]"
              style={{ background: c.swatch }}
            />
            <span className={`text-[10px] tracking-wider uppercase transition-colors ${
              selected === c.key ? "text-ink" : "text-muted-soft group-hover:text-muted"
            }`}>
              {c.label}
            </span>
          </button>
        ))}
      </div>
    </div>
  );
}

function SizeSelector({ sizes, selected, onChange }) {
  return (
    <div>
      <div className="flex items-baseline justify-between mb-4">
        <p className="kicker text-muted">Taille</p>
        <button type="button" className="text-xs text-muted hover:text-ink underline underline-offset-4 decoration-line">
          Guide des tailles
        </button>
      </div>
      <div className="grid grid-cols-3 gap-2">
        {sizes.map((size) => (
          <button
            key={size}
            type="button"
            onClick={() => onChange(size)}
            className={`press relative h-12 border transition-all duration-200 ${
              selected === size
                ? "border-ink bg-ink text-on-ink"
                : "border-line text-muted hover:border-ink hover:text-ink"
            }`}
          >
            <span className="text-sm font-medium tracking-wide">{size}</span>
            {size === "Full" && (
              <span className={`absolute top-1.5 right-2 text-[8px] font-mono tracking-widest ${
                selected === size ? "text-on-ink/60" : "text-muted-soft"
              }`}>
                STD
              </span>
            )}
          </button>
        ))}
      </div>
    </div>
  );
}

function Highlights({ items, layout }) {
  if (layout === "grid") {
    return (
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-5">
        {items.map((h, i) => (
          <div key={h} className="flex gap-3">
            <span className="num-suisse text-muted-soft pt-0.5 tick-num">
              {String(i + 1).padStart(2, "0")}
            </span>
            <p className="text-sm text-ink/85 leading-relaxed flex-1">{h}</p>
          </div>
        ))}
      </div>
    );
  }
  // fallback : liste minimale
  return (
    <ul className="flex flex-col gap-3">
      {items.map((h) => (
        <li key={h} className="flex items-start gap-3 text-sm text-ink/80">
          <span className="text-muted mt-1">—</span>
          <span>{h}</span>
        </li>
      ))}
    </ul>
  );
}

function TrustBar() {
  const items = [
    { icon: Leaf,   label: "Tannage français" },
    { icon: Truck,  label: "Expédié sous 48 h" },
    { icon: Shield, label: "Retours 30 jours" },
  ];
  return (
    <div className="mt-8 flex flex-wrap items-center gap-x-6 gap-y-3 text-muted">
      {items.map((it, i) => (
        <div key={i} className="flex items-center gap-2">
          <it.icon size={13} stroke={1.25} />
          <span className="text-[11px] tracking-wide">{it.label}</span>
        </div>
      ))}
    </div>
  );
}

// ─── Composant principal ──────────────────────────────────────────────────

function ProductDetailClient({ product, tweaks }) {
  const [selectedColour, setSelectedColour] = useState(product.defaultColour);
  const [selectedSize, setSelectedSize]     = useState(product.defaultSize);
  const [favorite, setFavorite]             = useState(false);
  const [added, setAdded]                   = useState(false);

  const currentColour = product.colours.find((c) => c.key === selectedColour);

  function handleAdd() {
    // Logique d'origine : addItem({...}) — on simule juste un feedback visuel
    setAdded(true);
    setTimeout(() => setAdded(false), 1400);
  }

  // Largeurs de colonnes selon le tweak
  const splitClasses = {
    "60-40": ["md:col-span-7", "md:col-span-5"],
    "50-50": ["md:col-span-6", "md:col-span-6"],
    "55-45": ["md:col-span-7 lg:col-span-7", "md:col-span-5 lg:col-span-5"],
  }[tweaks.split];

  return (
    <div className="mx-auto max-w-[1320px] px-5 md:px-12 pt-16 md:pt-24 pb-24">
      {/* Fil d'Ariane */}
      <a
        href="#"
        className="inline-flex items-center gap-2 text-xs tracking-wide text-muted hover:text-ink transition-colors press mb-10 md:mb-14"
      >
        <ArrowLeft size={13} stroke={1.5} />
        Retour à la boutique
      </a>

      {/* Layout principal */}
      <div className="grid grid-cols-1 md:grid-cols-12 gap-10 md:gap-16 lg:gap-20 items-start">
        {/* GAUCHE : galerie image */}
        <div className={`${splitClasses[0]} md:sticky md:top-12`}>
          <Gallery colour={selectedColour} layout={tweaks.gallery} />
          {/* Légende sous galerie — discret, ancrage artisanal */}
          <div className="mt-6 flex items-center justify-between text-muted">
            <p className="kicker">Réf · ELK-AND-{selectedColour.slice(0,3).toUpperCase()}-{selectedSize.slice(0,3).toUpperCase()}</p>
            <p className="num-suisse">N° 042 / 200</p>
          </div>
        </div>

        {/* DROITE : détails */}
        <div className={splitClasses[1]}>
          {/* Famille + titre */}
          <p className="kicker text-muted">{product.family}</p>
          <h1 className="display mt-4 text-[2.4rem] md:text-[3rem] xl:text-[3.4rem] leading-[1.05]">
            {product.name}
          </h1>
          <p className="display italic font-light text-muted mt-2 text-lg md:text-xl">
            {product.tagline}
          </p>

          {/* Prix — bloc dédié, séparé par un filet fin */}
          <div className="mt-7 pt-6 border-t border-line">
            <div className="flex items-baseline gap-4">
              <p className="font-mono text-3xl md:text-[2.25rem] text-ink tabular-nums tracking-tight">
                {formatPrice(product.priceEUR)}
              </p>
              <p className="text-xs text-muted">TTC · Paiement 3× sans frais</p>
            </div>

            {/* Avantages : ligne premium */}
            <PerksRow />
          </div>

          {/* Description courte */}
          <p className="mt-7 text-sm md:text-[15px] text-ink/75 leading-relaxed max-w-[58ch]">
            {product.description}
          </p>

          {/* Sélecteur coloris */}
          <div className="mt-9">
            <ColourSelector
              colours={product.colours}
              selected={selectedColour}
              onChange={setSelectedColour}
            />
          </div>

          {/* Sélecteur taille */}
          <div className="mt-8">
            <SizeSelector
              sizes={product.sizes}
              selected={selectedSize}
              onChange={setSelectedSize}
            />
          </div>

          {/* CTA panier + favoris */}
          <div className="mt-9 flex gap-2">
            <button
              type="button"
              onClick={handleAdd}
              className="cta-primary press flex-1 inline-flex items-center justify-between bg-ink text-on-ink pl-6 pr-3 h-14 text-sm tracking-wider hover:bg-ink-soft transition-colors"
            >
              <span className="inline-flex items-center gap-3 whitespace-nowrap">
                <Bag size={16} stroke={1.5} />
                <span className="font-medium uppercase">
                  {added ? "Ajouté" : "Ajouter au panier"}
                </span>
              </span>
              <span className="inline-flex items-center gap-3 pl-4 border-l border-white/15 h-7 whitespace-nowrap">
                {added
                  ? <Check size={16} stroke={2} className="text-on-ink" />
                  : <ArrowRight size={14} stroke={1.5} />}
              </span>
            </button>
            <button
              type="button"
              onClick={() => setFavorite((v) => !v)}
              aria-label="Ajouter aux favoris"
              className={`press w-14 h-14 border flex items-center justify-center transition-all duration-200 ${
                favorite ? "border-ink bg-ink text-on-ink" : "border-line text-ink hover:border-ink"
              }`}
            >
              <Heart size={17} stroke={1.5} filled={favorite} />
            </button>
          </div>

          {/* Trust bar */}
          <TrustBar />

          {/* Points clés */}
          <div className="mt-12 pt-10 border-t border-line">
            <div className="flex items-baseline justify-between mb-7">
              <p className="kicker text-muted">Points clés</p>
              <p className="num-suisse text-muted-soft">{product.highlights.length} caractéristiques</p>
            </div>
            <Highlights items={product.highlights} layout="grid" />
          </div>

          {/* Description longue */}
          <div className="mt-10 pt-10 border-t border-line">
            <p className="kicker text-muted mb-4">L'objet</p>
            <p className="text-sm text-ink/75 leading-relaxed max-w-[58ch]">
              {product.longDescription}
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

window.ProductDetailClient = ProductDetailClient;
window.PRODUCT = PRODUCT;

// App entry — wrappe ProductDetailClient avec un Tweaks panel et un mini header.

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "gallery": "default",
  "split": "55-45",
  "showTrust": true
}/*EDITMODE-END*/;

function MiniHeader() {
  return (
    <header className="sticky top-0 z-40 bg-paper/80 backdrop-blur border-b border-line">
      <div className="mx-auto max-w-[1320px] px-5 md:px-12 h-14 flex items-center justify-between">
        <a href="#" className="display text-xl tracking-tight">Elekka</a>
        <nav className="hidden md:flex items-center gap-8 text-xs tracking-widest uppercase text-muted">
          <a href="#" className="hover:text-ink transition-colors">Boutique</a>
          <a href="#" className="hover:text-ink transition-colors">Atelier</a>
          <a href="#" className="hover:text-ink transition-colors">Contact</a>
        </nav>
        <div className="flex items-center gap-5 text-ink">
          <button className="press"><Search size={16} stroke={1.5} /></button>
          <button className="press"><Heart size={16} stroke={1.5} /></button>
          <button className="press relative">
            <Bag size={16} stroke={1.5} />
            <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-ink text-on-ink rounded-full text-[8px] flex items-center justify-center font-mono">2</span>
          </button>
        </div>
      </div>
    </header>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <div className="min-h-screen">
      <MiniHeader />
      <ProductDetailClient product={PRODUCT} tweaks={t} />

      <TweaksPanel>
        <TweakSection label="Galerie" />
        <TweakRadio
          label="Disposition"
          value={t.gallery}
          options={[
            { value: "default",     label: "Sous image" },
            { value: "left-thumbs", label: "À gauche" },
          ]}
          onChange={(v) => setTweak("gallery", v)}
        />
        <TweakSection label="Layout" />
        <TweakRadio
          label="Répartition"
          value={t.split}
          options={[
            { value: "50-50", label: "50 / 50" },
            { value: "55-45", label: "55 / 45" },
            { value: "60-40", label: "60 / 40" },
          ]}
          onChange={(v) => setTweak("split", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
